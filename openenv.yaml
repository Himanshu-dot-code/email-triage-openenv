name: email-triage-env

description: >
  A reinforcement learning environment where an AI agent learns to classify emails
  by category, priority, and spam detection using structured observations and actions.

version: 0.1.0

entry_point: env.environment:EmailTriageEnv

observation_space:
  subject: string
  body: string
  sender_type: string

action_space:
  category: string
  priority: string
  spam: boolean

reward:
  type: float
  range: [0.0, 1.0]

tasks:
  - task_easy
  - task_medium
  - task_hard